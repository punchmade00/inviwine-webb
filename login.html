<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>InviWine — Connexion</title>
  <link rel="stylesheet" href="css/style.css"/>
    <link rel="icon" href="logo.png" type="image/png"/>
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .auth-container { width: 100%; max-width: 400px; padding: 40px 32px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius-lg); margin: 24px; }
    .auth-logo { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
    .auth-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: var(--text-2); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-2); }
    .form-input { width: 100%; padding: 10px 14px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--gold); }
    .btn-submit { width: 100%; padding: 12px; background: var(--gold); color: #000; font-weight: 700; font-size: 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-2); }
    .auth-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .msg { font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); margin-top: 12px; display: none; }
    .msg.error { background: var(--red-subtle); color: var(--red); display: block; }
    .msg.success { background: rgba(34,197,94,0.1); color: #22C55E; display: block; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo"><span class="nav-logo-dot"></span> InviWine</div>
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-sub">Accédez à votre portefeuille vinicole.</p>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="votre@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Se connecter →</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="auth-link">Pas encore de compte ? <a href="/signup">S'inscrire</a></div>
  </div>
  <script src="js/core.js"></script>
  <script>
    (async () => {
      await IW.loadSupabase();
      await IW.redirectIfAuth();
    })();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Connexion en cours…';
      msg.className = 'msg';
      msg.textContent = '';
      try {
        await IW.signIn(email, password);
        window.location.href = '/dashboard';
      } catch(err) {
        msg.className = 'msg error';
        msg.textContent = err.message || 'Email ou mot de passe incorrect.';
        btn.disabled = false;
        btn.textContent = 'Se connecter →';
      }
    });
  </script>
</body>
</html>
